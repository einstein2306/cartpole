<!DOCTYPE html>
<html lang="en">
<head>
    <link href="/static/bootstrap.min.css" rel="stylesheet">
    <script src="/static/bootstrap.bundle.min.js"></script>
    <script src="/static/socket.io.min.js"></script>
    <script src="/static/ai.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #heading{
            font-weight:800;
            font-size:27px;
        }
        .box{
            position:relative;
            height:390px;
            width:100%;
            
        }
        img{
            position:absolute;
            height:90%;
            width:90%;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <p id="heading" class="text-center bg-dark text-white">CartPole AI Mode</p>
        </div>
        <div class="row">
            <div class="col-md-6 mx-auto">
                <table class="table table-bordered shadow shadow-sm">
                    <thead class="table-dark text-center">
                        <!--<th scope="col">load</th>-->
                        <th scope="col">start</th>
                        <th scope="col">stop</th>
                        <th scope="col">Link</th>
                    </thead>
                    <tbody>
                        <tr class="text-center">
                            <!--<td><button id="start-btn" class="btn btn-sm btn-info" onclick="load()">load</button></td>-->
                            <td><button id="start-btn" class="btn btn-sm btn-success" onclick="start()" disabled>start</button></td>
                            <td><button id="stop-btn" class="btn btn-sm btn-danger" onclick="stop()" disabled>stop</button></td>
                            <td><button class="btn btn-link"><a href="/"><em>UserMode</em></a></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="row">
                <div class="col-md-6 mx-auto">
                    <div class="box d-flex justify-content-center align-items-center rounded">
                        <p id="message" class="alert alert-warning text-center shadow shadow-sm">first, click on <strong>load</strong> to fetch the data.</p>
                        <img class="img-thumbnail rounded shadow shadow-sm" id="animation"  alt="" style="display: none;">
                    </div>
                </div>
            </div>
        </div>
    </div>  
  
</body>
</html>
